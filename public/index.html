<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Study & Lookup Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    header h1 { font-size: 17px; font-weight: 500; }
    header p { font-size: 12px; opacity: 0.6; margin-top: 2px; }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .message.user {
      background: #1a1a2e;
      color: white;
      align-self: flex-end;
      border-radius: 12px 12px 2px 12px;
    }

    .message.agent {
      background: white;
      color: #333;
      align-self: flex-start;
      border-radius: 12px 12px 12px 2px;
      border: 1px solid #e0e0e0;
    }

    .message.thinking {
      background: #f0f0f0;
      color: #999;
      align-self: flex-start;
      font-style: italic;
      font-size: 13px;
    }

    /* EMPTY STATE — centered input */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 24px;
    }

    #empty-state h2 {
      font-size: 22px;
      font-weight: 500;
      color: #1a1a2e;
      text-align: center;
    }

    #empty-state p {
      font-size: 14px;
      color: #888;
      text-align: center;
      max-width: 400px;
      line-height: 1.6;
    }

    .empty-input-row {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 560px;
    }

    .suggestion-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 560px;
    }

    .suggestion {
      padding: 12px 16px;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      font-size: 13px;
      color: #444;
      cursor: pointer;
      text-align: left;
      transition: all .15s;
      line-height: 1.4;
    }

    .suggestion:hover {
      background: #1a1a2e;
      color: white;
      border-color: #1a1a2e;
    }

    .suggestion strong {
      display: block;
      font-size: 12px;
      opacity: 0.6;
      margin-bottom: 2px;
    }

    /* ACTIVE STATE — input at bottom */
    #bottom-bar {
      padding: 16px 24px;
      background: white;
      border-top: 1px solid #e0e0e0;
      display: none;
      gap: 10px;
      flex-shrink: 0;
    }

    #bottom-bar.visible {
      display: flex;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    input[type="text"]:focus { border-color: #1a1a2e; }

    button.send {
      padding: 10px 20px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    button.send:hover { background: #2a2a4e; }
    button.send:disabled { background: #999; cursor: default; }
  </style>
</head>
<body>

  <header>
  <div>
    <h1>AI Study & Lookup Agent</h1>
    <p>NetSuite exam prep · Weather · Customer lookup</p>
  </div>
  <button onclick="clearScreen()" style="margin-left:auto;padding:6px 14px;background:transparent;color:white;border:1px solid rgba(255,255,255,0.3);border-radius:6px;font-size:12px;cursor:pointer;">
    Clear screen
  </button>
</header>

  <!-- EMPTY STATE — shown before first message -->
  <div id="empty-state">
    <div>
      <h2>What can I help you with?</h2>
      <p style="text-align:center;color:#888;font-size:14px;margin-top:8px;">
        Ask me a NetSuite exam question, look up a customer, or check the weather anywhere.
      </p>
    </div>

    <div class="suggestion-grid">
      <button class="suggestion" onclick="suggest('Give me a practice question about User Roles')">
        <strong>Exam prep</strong>
        Practice question on User Roles
      </button>
      <button class="suggestion" onclick="suggest('What are the trigger types for SuiteFlow?')">
        <strong>Exam prep</strong>
        SuiteFlow trigger types
      </button>
      <button class="suggestion" onclick="suggest('What is the weather in Bridgeport CT?')">
        <strong>Weather</strong>
        Current weather in Bridgeport CT
      </button>
      <button class="suggestion" onclick="suggest('Look up a customer named Leanne')">
        <strong>Customer</strong>
        Look up customer Leanne
      </button>
    </div>

    <div class="empty-input-row">
      <input
        type="text"
        id="center-input"
        placeholder="Ask anything..."
        onkeydown="if(event.key==='Enter') sendMessage('center')"
      />
      <button class="send" onclick="sendMessage('center')">Send</button>
    </div>
  </div>

  <!-- CHAT STATE — shown after first message -->
  <div id="chat-window" style="display:none;"></div>

  <!-- BOTTOM INPUT BAR — shown after first message -->
  <div id="bottom-bar">
    <input
      type="text"
      id="bottom-input"
      placeholder="Ask anything..."
      onkeydown="if(event.key==='Enter') sendMessage('bottom')"
    />
    <button class="send" id="send-btn" onclick="sendMessage('bottom')">Send</button>
  </div>

  <script>
    const sessionId = Math.random().toString(36).slice(2);
    let conversationStarted = false;

    function startConversation() {
      if (!conversationStarted) {
        conversationStarted = true;
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('bottom-bar').classList.add('visible');
        setTimeout(() => document.getElementById('bottom-input').focus(), 100);
      }
    }

    function addMessage(role, text) {
      const chatWindow = document.getElementById('chat-window');
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = text;
      chatWindow.appendChild(div);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      return div;
    }

    function suggest(text) {
      document.getElementById('center-input').value = text;
      sendMessage('center');
    }

    async function sendMessage(source) {
      const inputId = source === 'center' ? 'center-input' : 'bottom-input';
      const input = document.getElementById(inputId);
      const message = input.value.trim();
      if (!message) return;

      input.value = '';
      startConversation();

      const btn = document.getElementById('send-btn');
      if (btn) btn.disabled = true;

      addMessage('user', message);
      const thinking = addMessage('thinking', 'Agent is thinking...');

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, sessionId })
        });

        const data = await res.json();
        thinking.remove();

        if (data.error) {
          addMessage('agent', 'Error: ' + data.error);
        } else {
          addMessage('agent', data.reply);
        }

      } catch (err) {
        thinking.remove();
        addMessage('agent', 'Error: could not reach the server.');
      }

      if (btn) btn.disabled = false;
      document.getElementById('bottom-input').focus();
    }

    function clearScreen() {
  const chatWindow = document.getElementById('chat-window');
  chatWindow.innerHTML = '';
}
  </script>

</body>
</html>
