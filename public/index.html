<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Study & Lookup Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 16px 24px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 500;
    }

    header p {
      font-size: 13px;
      opacity: 0.7;
      margin-top: 4px;
    }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .message.user {
      background: #1a1a2e;
      color: white;
      align-self: flex-end;
      border-radius: 12px 12px 2px 12px;
    }

    .message.agent {
      background: white;
      color: #333;
      align-self: flex-start;
      border-radius: 12px 12px 12px 2px;
      border: 1px solid #e0e0e0;
    }

    .message.thinking {
      background: #f0f0f0;
      color: #999;
      align-self: flex-start;
      font-style: italic;
      font-size: 13px;
    }

    #input-area {
      padding: 16px 24px;
      background: white;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
    }

    #user-input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    #user-input:focus {
      border-color: #1a1a2e;
    }

    #send-btn {
      padding: 10px 20px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    #send-btn:hover { background: #2a2a4e; }
    #send-btn:disabled { background: #999; cursor: default; }

    .suggestions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 0 24px 16px;
    }

    .suggestion {
      padding: 6px 12px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 16px;
      font-size: 12px;
      color: #555;
      cursor: pointer;
      transition: all .15s;
    }

    .suggestion:hover {
      background: #1a1a2e;
      color: white;
      border-color: #1a1a2e;
    }
  </style>
</head>
<body>

  <header>
    <h1>AI Study & Lookup Agent</h1>
    <p>NetSuite exam prep · Weather · Customer lookup</p>
  </header>

  <div id="chat-window"></div>

  <div class="suggestions">
    <button class="suggestion" onclick="suggest('Give me a practice question about User Roles')">User Roles question</button>
    <button class="suggestion" onclick="suggest('What are the trigger types for SuiteFlow?')">SuiteFlow triggers</button>
    <button class="suggestion" onclick="suggest('What is the weather in Bridgeport CT?')">Weather in Bridgeport</button>
    <button class="suggestion" onclick="suggest('Look up a customer named Leanne')">Look up Leanne</button>
  </div>

  <div id="input-area">
    <input
      type="text"
      id="user-input"
      placeholder="Ask anything..."
      onkeydown="if(event.key==='Enter') sendMessage()"
    />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <script>
    const sessionId = Math.random().toString(36).slice(2);

    function addMessage(role, text) {
      const window = document.getElementById('chat-window');
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = text;
      window.appendChild(div);
      window.scrollTop = window.scrollHeight;
      return div;
    }

    function suggest(text) {
      document.getElementById('user-input').value = text;
      sendMessage();
    }

    async function sendMessage() {
      const input = document.getElementById('user-input');
      const btn = document.getElementById('send-btn');
      const message = input.value.trim();
      if (!message) return;

      input.value = '';
      btn.disabled = true;

      addMessage('user', message);
      const thinking = addMessage('thinking', 'Agent is thinking...');

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, sessionId })
        });

        const data = await res.json();
        thinking.remove();

        if (data.error) {
          addMessage('agent', 'Error: ' + data.error);
        } else {
          addMessage('agent', data.reply);
        }

      } catch (err) {
        thinking.remove();
        addMessage('agent', 'Error: could not reach the server.');
      }

      btn.disabled = false;
      input.focus();
    }

    addMessage('agent', 'Hello! I can help you study for the NetSuite SuiteFoundation exam, look up customer information, or check the weather anywhere. What would you like to know?');
  </script>

</body>
</html>
